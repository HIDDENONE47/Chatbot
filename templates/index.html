<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CyberNet | Security AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      /* Color Palette */
      --bg-base: #030712;
      --bg-surface: rgba(17, 24, 39, 0.65);
      --neon-cyan: #00f0ff;
      --neon-purple: #8a2be2;
      --text-primary: #f3f4f6;
      --text-secondary: #9ca3af;
      --border-color: rgba(255, 255, 255, 0.08);
      
      /* Effects */
      --glow-cyan: 0 0 20px rgba(0, 240, 255, 0.3);
      --glow-purple: 0 0 20px rgba(138, 43, 226, 0.3);
      --glass-blur: blur(20px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-base);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Ambient Animated Background */
    .ambient-bg {
      position: absolute;
      top: 0; left: 0; width: 100vw; height: 100vh;
      z-index: 0;
      overflow: hidden;
    }
    .ambient-glow {
      position: absolute;
      width: 60vw; height: 60vw;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      animation: float 20s infinite ease-in-out alternate;
    }
    .glow-1 { background: var(--neon-cyan); top: -20%; left: -10%; }
    .glow-2 { background: var(--neon-purple); bottom: -20%; right: -10%; animation-delay: -10s; }

    /* Tech Grid */
    body::after {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background-image: linear-gradient(var(--border-color) 1px, transparent 1px),
                        linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.15;
      z-index: 0;
      pointer-events: none;
    }

    /* Main App Container */
    .app-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 900px;
      height: 92vh;
      display: flex;
      flex-direction: column;
      border-radius: 24px;
      padding: 2px; /* For the gradient border */
      background: linear-gradient(135deg, rgba(0,240,255,0.2), rgba(138,43,226,0.2), transparent 40%);
      box-shadow: 0 30px 60px rgba(0,0,0,0.6);
    }

    .app-container {
      background: var(--bg-surface);
      backdrop-filter: var(--glass-blur);
      -webkit-backdrop-filter: var(--glass-blur);
      border-radius: 22px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header section */
    header {
      padding: 20px 30px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(255,255,255,0.05), transparent);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .brand-icon {
      width: 36px; height: 36px;
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid var(--neon-cyan);
      border-radius: 10px;
      display: flex; justify-content: center; align-items: center;
      box-shadow: var(--glow-cyan);
    }

    header h1 {
      font-size: 1.5rem;
      font-weight: 600;
      background: linear-gradient(to right, #fff, var(--neon-cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 1px;
    }

    .status {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.85rem; color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
    }

    .status-dot {
      width: 8px; height: 8px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 10px #10b981;
      animation: pulse 2s infinite;
    }

    /* Chat Box */
    #chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    #chat-box::-webkit-scrollbar { width: 6px; }
    #chat-box::-webkit-scrollbar-track { background: transparent; }
    #chat-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    #chat-box::-webkit-scrollbar-thumb:hover { background: rgba(0, 240, 255, 0.3); }

    .message-wrapper {
      display: flex;
      gap: 16px;
      max-width: 85%;
      animation: messageSlide 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
      opacity: 0;
      transform: translateY(20px);
    }

    .wrapper-user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .wrapper-bot {
      align-self: flex-start;
    }

    .avatar {
      width: 40px; height: 40px;
      border-radius: 12px;
      display: flex; justify-content: center; align-items: center;
      flex-shrink: 0;
    }

    .wrapper-user .avatar {
      background: linear-gradient(135deg, #2d3748, #1a202c);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .wrapper-bot .avatar {
      background: rgba(0, 240, 255, 0.1);
      border: 1px solid var(--neon-cyan);
      box-shadow: 0 0 15px rgba(0, 240, 255, 0.2);
    }

    .message {
      padding: 16px 20px;
      border-radius: 16px;
      line-height: 1.6;
      font-size: 1rem;
      position: relative;
    }

    .user {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-top-right-radius: 4px;
      color: #fff;
    }

    .bot {
      background: rgba(0, 240, 255, 0.03);
      border: 1px solid rgba(0, 240, 255, 0.15);
      border-top-left-radius: 4px;
      color: var(--text-primary);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.95rem;
    }

    /* Cyber Scanning Animation for Thinking State */
    .scanning {
      position: relative;
      overflow: hidden;
      color: var(--neon-cyan);
    }
    .scanning::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(transparent, rgba(0, 240, 255, 0.1), transparent);
      transform: translateY(-100%);
      animation: scanBar 1.5s linear infinite;
    }
    
    .loading-text {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .loading-text span {
      display: inline-block;
      width: 4px; height: 16px;
      background: var(--neon-cyan);
      animation: bars 1s ease-in-out infinite;
    }
    .loading-text span:nth-child(2) { animation-delay: 0.1s; }
    .loading-text span:nth-child(3) { animation-delay: 0.2s; }

    /* Input Area */
    #input-container {
      padding: 20px 30px;
      background: rgba(0, 0, 0, 0.2);
      border-top: 1px solid var(--border-color);
    }

    .input-box {
      display: flex;
      gap: 12px;
      background: rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 8px;
      transition: all 0.3s ease;
    }

    .input-box:focus-within {
      border-color: rgba(0, 240, 255, 0.5);
      box-shadow: 0 0 20px rgba(0, 240, 255, 0.1);
      background: rgba(0, 0, 0, 0.6);
    }

    #question {
      flex: 1;
      background: transparent;
      border: none;
      padding: 12px 16px;
      color: #fff;
      font-size: 1.05rem;
      font-family: 'Outfit', sans-serif;
      outline: none;
    }

    #question::placeholder { color: var(--text-secondary); }

    button {
      background: var(--neon-cyan);
      color: #000;
      border: none;
      border-radius: 12px;
      width: 48px; height: 48px;
      display: flex; justify-content: center; align-items: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover {
      background: #fff;
      box-shadow: var(--glow-cyan);
      transform: scale(1.05);
    }
    button:active { transform: scale(0.95); }

    /* Keyframes */
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(10%, 10%) scale(1.1); }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }
    @keyframes messageSlide {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes scanBar {
      0% { transform: translateY(-100%); }
      100% { transform: translateY(100%); }
    }
    @keyframes bars {
      0%, 100% { transform: scaleY(0.5); opacity: 0.5; }
      50% { transform: scaleY(1); opacity: 1; }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .app-wrapper { height: 100vh; border-radius: 0; max-width: 100%; }
      .app-container { border-radius: 0; }
      .message-wrapper { max-width: 95%; }
    }
  </style>
</head>
<body>

  <div class="ambient-bg">
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>
  </div>

  <div class="app-wrapper">
    <div class="app-container">
      
      <header>
        <div class="brand">
          <div class="brand-icon">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
          </div>
          <h1>CyberNet</h1>
        </div>
        <div class="status">
          <div class="status-dot"></div>
          SECURE LINK
        </div>
      </header>

      <div id="chat-box">
        <div class="message-wrapper wrapper-bot" style="opacity: 1; transform: translateY(0);">
          <div class="avatar">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--neon-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect>
              <rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect>
              <line x1="6" y1="6" x2="6.01" y2="6"></line>
              <line x1="6" y1="18" x2="6.01" y2="18"></line>
            </svg>
          </div>
          <div class="message bot">
            System initialized. Advanced persistent threat scanning online.<br><br>How can I assist with your security posture today?
          </div>
        </div>
      </div>

      <div id="input-container">
        <div class="input-box">
          <input id="question" type="text" placeholder="Enter security command or query..." autocomplete="off" />
          <button onclick="sendMessage()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"></line>
              <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
            </svg>
          </button>
        </div>
      </div>

    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chat-box");
    const input = document.getElementById("question");

    // Icons for avatars
    const botIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--neon-cyan)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>`;
    const userIcon = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>`;

    input.addEventListener("keydown", e => {
      if (e.key === "Enter") sendMessage();
    });

    function addMessage(text, sender) {
      const wrapper = document.createElement("div");
      wrapper.className = `message-wrapper wrapper-${sender.includes('bot') ? 'bot' : 'user'}`;
      
      const avatar = document.createElement("div");
      avatar.className = "avatar";
      avatar.innerHTML = sender.includes('bot') ? botIcon : userIcon;

      const msg = document.createElement("div");
      msg.className = `message ${sender.includes('bot') ? 'bot' : 'user'}`;
      
      if (sender === "bot thinking") {
        msg.classList.add("scanning");
        msg.innerHTML = `
          <div class="loading-text">
            Processing Query 
            <span></span><span></span><span></span>
          </div>
        `;
      } else {
        // Replace newlines with <br> for formatting
        msg.innerHTML = text.replace(/\n/g, '<br>');
      }
      
      wrapper.appendChild(avatar);
      wrapper.appendChild(msg);
      chatBox.appendChild(wrapper);
      
      // Smooth scroll to bottom
      setTimeout(() => {
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
      }, 50);

      return msg;
    }

    async function sendMessage() {
      const question = input.value.trim();
      if (!question) return;
      input.value = "";

      // Add User Message
      addMessage(question, "user");
      
      // Add Loading Indicator
      const thinkingBubble = addMessage("", "bot thinking");

      try {
        const response = await fetch("/ask", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ question })
        });

        const data = await response.json();
        
        // Remove scanning class and set actual text
        thinkingBubble.classList.remove("scanning");
        thinkingBubble.innerHTML = data.answer.replace(/\n/g, '<br>');
        
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
      } catch (error) {
        thinkingBubble.classList.remove("scanning");
        thinkingBubble.style.color = "#ff4757";
        thinkingBubble.style.borderColor = "#ff4757";
        thinkingBubble.style.background = "rgba(255, 71, 87, 0.05)";
        thinkingBubble.innerHTML = "[ERROR] Threat detected in connection pipeline. Server unreachable.";
      }
    }
  </script>
</body>
</html>
